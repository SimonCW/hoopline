<article class="card bg-base-100 shadow-md" data-testid="slot-card">
    <div class="card-body p-4 md:p-6">
        <h2 class="card-title text-lg">{{ slot.datetime }}</h2>
        <p class="text-sm text-base-content/70 mb-2">{{ slot.venue }}</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="overflow-x-auto">
                <h3 class="font-semibold mb-2">Players</h3>
                <table class="table table-zebra table-sm">
                    <thead>
                        <tr><th>#</th><th>Name</th></tr>
                    </thead>
                    <tbody>
                        {% for i in 0..15 %}
                        <tr data-testid="player-row">
                            <td>{{ loop.index }}</td>
                            <td>{{ slot.player_name(i) }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            <div class="overflow-x-auto">
                <h3 class="font-semibold mb-2">Waitlist</h3>
                <table class="table table-zebra table-sm">
                    <thead>
                        <tr><th>#</th><th>Name</th></tr>
                    </thead>
                    <tbody>
                        {% for i in 0..5 %}
                        <tr data-testid="waitlist-row">
                            <td>{{ loop.index }}</td>
                            <td>{{ slot.waitlist_name(i) }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</article>
